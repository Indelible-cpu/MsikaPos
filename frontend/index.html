<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/icon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MsikaPos">
  <meta name="application-name" content="MsikaPos">
  <meta name="description" content="MsikaPos - Premium Enterprise Point of Sale and Inventory Management System." />
  <title>MsikaPos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <style>
    #global-loader {
      position: fixed;
      inset: 0;
      background-color: #020202;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
      font-family: 'Outfit', sans-serif;
    }

    .loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .loader-title {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      display: flex;
      align-items: center;
    }

    .loader-title .msika { color: #1e293b; } /* Dark/Navy */
    .loader-title .pos { color: #22c55e; }   /* Green */

    .dark .loader-title .msika { color: #f8fafc; }

    .loader-tagline {
      display: flex;
      align-items: center;
      gap: 16px;
      color: #fafafa;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .tagline-line {
      height: 1px;
      width: 40px;
      background-color: #22c55e;
    }

    .loader-progress-container {
      width: 200px;
      height: 2px;
      background-color: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 8px;
    }

    .loader-progress-bar {
      height: 100%;
      width: 40%;
      background-color: #22c55e;
      border-radius: 10px;
      animation: progressMove 1.5s infinite ease-in-out;
    }

    @keyframes progressMove {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(250%); }
    }
  </style>
</head>

<body>
  <div id="global-loader">
    <div class="loader-content">
      <div class="loader-title">
        <span class="msika">Msika</span><span class="pos">Pos</span>
      </div>
      <div class="loader-tagline">
        <div class="tagline-line"></div>
        <span>Run Your Shop. Grow Your Business.</span>
        <div class="tagline-line"></div>
      </div>
      <div class="loader-progress-container">
        <div class="loader-progress-bar"></div>
      </div>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <script>
    try {
      const theme = localStorage.getItem('theme');
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        document.getElementById('global-loader').style.backgroundColor = '#020202';
      } else {
        document.documentElement.classList.remove('dark');
        document.getElementById('global-loader').style.backgroundColor = '#fcfdfe';
      }
    } catch(e) {}
    
    // Hide loader when page is fully loaded and React has started
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('global-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => {
            if (loader.parentNode) loader.remove();
          }, 300);
        }
      }, 500);
    });
  </script>
</body>

</html>
