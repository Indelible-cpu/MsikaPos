<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="JIMS - Premium Enterprise Point of Sale and Inventory Management System." />
  <title>Jims | Smart Pos System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <style>
    #global-loader {
      position: fixed;
      inset: 0;
      background-color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    .splash-logo-container {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      background-color: #1e293b;
      border: 3px solid #10b981;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.2);
    }
    #splash-logo {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>
  <div id="global-loader">
    <div class="splash-logo-container">
      <img id="splash-logo" src="/pwa-192x192.png" alt="Company Logo" title="Loading..." />
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <script>
    try {
      const storedLogo = localStorage.getItem('companyLogo');
      if (storedLogo) {
        const splash = document.getElementById('splash-logo');
        if (splash) splash.src = storedLogo;
      }
    } catch(e) {}
    
    // Hide loader when page is fully loaded and React has started
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('global-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => {
            if (loader.parentNode) loader.remove();
          }, 300);
        }
      }, 500);
    });
  </script>
</body>

</html>
