<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/icon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MsikaPos">
  <meta name="application-name" content="MsikaPos">
  <meta name="description" content="MsikaPos - Premium Enterprise Point of Sale and Inventory Management System." />
  <title>MsikaPos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <style>
    #global-loader {
      position: fixed;
      inset: 0;
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
      font-family: 'Outfit', sans-serif;
    }

    .loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .loader-title {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      display: flex;
      align-items: center;
    }

    .loader-title .msika {
      color: #001f3f; /* Dark Navy from icon */
    }

    .loader-title .pos {
      color: #22c55e; /* Green from icon */
    }

    .loader-tagline {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    .loader-tagline .line {
      height: 2px;
      width: 24px;
      background-color: #22c55e;
    }

    .loader-tagline span {
      color: #1a1a1a;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .loader-progress {
      width: 200px;
      height: 4px;
      background-color: #f1f5f9;
      margin-top: 32px;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .loader-progress-bar {
      height: 100%;
      width: 0%;
      background-color: #22c55e;
      border-radius: 10px;
      animation: fillProgress 10s linear forwards;
    }

    @keyframes fillProgress {
      0% { width: 0%; }
      100% { width: 100%; }
    }
  </style>
</head>

<body>
  <div id="global-loader">
    <div class="loader-content">
      <div class="loader-title">
        <span class="msika">Msika</span><span class="pos">Pos</span>
      </div>
      <div class="loader-tagline">
        <div class="line"></div>
        <span>Run Your Shop. Grow Your Business.</span>
        <div class="line"></div>
      </div>
      <div class="loader-progress">
        <div class="loader-progress-bar"></div>
      </div>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <script>
    try {
      const hasShownSplash = sessionStorage.getItem('hasShownSplash');
      const loader = document.getElementById('global-loader');
      
      if (hasShownSplash) {
        if (loader) loader.remove();
      } else {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
          if (loader) loader.style.backgroundColor = '#020202';
        } else {
          document.documentElement.classList.remove('dark');
          if (loader) loader.style.backgroundColor = '#fcfdfe';
        }
      }
    } catch(e) {}
    
    // Hide loader when page is fully loaded and React has started
    window.addEventListener('load', () => {
      const loader = document.getElementById('global-loader');
      if (!loader) return;

      setTimeout(() => {
        loader.style.opacity = '0';
        sessionStorage.setItem('hasShownSplash', 'true');
        setTimeout(() => {
          if (loader.parentNode) loader.remove();
        }, 500);
      }, 10000); // 10 seconds as requested
    });
  </script>
</body>

</html>
