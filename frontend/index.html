<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/icon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MsikaPos">
  <meta name="application-name" content="MsikaPos">
  <meta name="description" content="MsikaPos - Premium Enterprise Point of Sale and Inventory Management System." />
  <title>MsikaPos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <style>
    #global-loader {
      position: fixed;
      inset: 0;
      background-color: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
      font-family: 'Inter', sans-serif;
    }

    .loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px;
    }

    .loader-title {
      font-size: 56px;
      font-weight: 900;
      letter-spacing: -0.05em;
      color: #ffffff;
      margin-bottom: 4px;
    }

    .loader-title span {
      color: #22c55e;
    }

    .green-bar {
      width: 80px;
      height: 8px;
      background-color: #22c55e;
      border-radius: 2px;
      margin: 10px 0;
    }

    .loader-tagline {
      color: #22c55e;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="global-loader">
    <div class="loader-content">
      <div class="loader-title">Msika<span>Pos</span></div>
      <div class="green-bar"></div>
      <div class="loader-tagline">
        _______Build Your Shop. Grow Your Business_______
      </div>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <script>
    try {
      const theme = localStorage.getItem('theme');
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        document.getElementById('global-loader').style.backgroundColor = '#020202';
      } else {
        document.documentElement.classList.remove('dark');
        document.getElementById('global-loader').style.backgroundColor = '#fcfdfe';
      }
    } catch(e) {}
    
    // Hide loader when page is fully loaded and React has started
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('global-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => {
            if (loader.parentNode) loader.remove();
          }, 500);
        }
      }, 30000); // 30 seconds as requested
    });
  </script>
</body>

</html>
